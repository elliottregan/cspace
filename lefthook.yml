rc: export PATH="$HOME/go/bin:$PATH"

pre-commit:
  parallel: true
  commands:
    fmt-go:
      glob: "*.go"
      run: gofmt -w {staged_files} && goimports -w {staged_files}
      stage_fixed: true
    lint-go:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~1 ./...
    lint-shell:
      glob: "*.sh"
      exclude: "lib/scripts/statusline.sh"
      run: shellcheck {staged_files}

pre-push:
  parallel: false
  commands:
    lint:
      run: golangci-lint run ./...
    test:
      run: go test ./...

post-commit:
  commands:
    search-index:
      run: |
        if [ -x ./bin/cspace-search ]; then
          ( ./bin/cspace-search index --corpus=code --quiet >> .cspace/search-index.log 2>&1 & )
        fi

post-checkout:
  commands:
    search-index:
      run: |
        if [ -x ./bin/cspace-search ]; then
          ( ./bin/cspace-search index --corpus=code --quiet >> .cspace/search-index.log 2>&1 & )
        fi

post-merge:
  commands:
    search-index:
      run: |
        if [ -x ./bin/cspace-search ]; then
          ( ./bin/cspace-search index --corpus=code --quiet >> .cspace/search-index.log 2>&1 & )
        fi
