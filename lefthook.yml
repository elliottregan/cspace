rc: .lefthookrc

pre-commit:
  parallel: true
  commands:
    fmt-go:
      glob: "*.go"
      run: gofmt -w {staged_files} && goimports -w {staged_files}
      stage_fixed: true
    lint-go:
      glob: "*.go"
      run: golangci-lint run ./...
    vet-go:
      glob: "*.go"
      run: go vet ./...
    lint-shell:
      glob: "*.sh"
      exclude: "lib/scripts/statusline.sh"
      run: shellcheck {staged_files}

pre-push:
  parallel: false
  commands:
    lint:
      run: golangci-lint run ./...
    test:
      run: go test ./...
