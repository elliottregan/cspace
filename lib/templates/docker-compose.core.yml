# Core cspace service — used by all cspace projects.
# Project-specific services are added via compose file layering (-f).
# Browser sidecar provides Chrome CDP + Playwright run-server per instance.

include:
  - docker-compose.search.yml

services:
  cspace:
    image: ${CSPACE_IMAGE:-cspace-dev}
    container_name: ${CSPACE_CONTAINER_NAME}
    hostname: ${CSPACE_INSTANCE_NAME}
    build:
      # Build context is the cspace repo root so the Dockerfile can COPY
      # both bin/cspace and lib/. Override the Dockerfile path via
      # CSPACE_DOCKERFILE for project-specific extensions.
      context: ${CSPACE_HOME}
      dockerfile: ${CSPACE_DOCKERFILE:-${CSPACE_HOME}/lib/templates/Dockerfile}

    # Required for iptables firewall (init-firewall.sh)
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Used by cspace list/down to discover instances
    labels:
      - "cspace.instance=true"
      - "cspace.project=${CSPACE_PROJECT_NAME}"
      # Traefik routing: dev.<instance>.<project>.cspace.local -> port 3000
      - "traefik.enable=true"
      - "traefik.docker.network=${CSPACE_PROJECT_NETWORK}"
      - "traefik.http.routers.${CSPACE_CONTAINER_NAME}-dev.rule=Host(`dev.${CSPACE_INSTANCE_NAME}.${CSPACE_PROJECT_NAME}.cspace.local`)"
      - "traefik.http.routers.${CSPACE_CONTAINER_NAME}-dev.entrypoints=web"
      - "traefik.http.routers.${CSPACE_CONTAINER_NAME}-dev.service=${CSPACE_CONTAINER_NAME}-dev"
      - "traefik.http.services.${CSPACE_CONTAINER_NAME}-dev.loadbalancer.server.port=3000"
      # Traefik routing: preview.<instance>.<project>.cspace.local -> port 4173
      - "traefik.http.routers.${CSPACE_CONTAINER_NAME}-preview.rule=Host(`preview.${CSPACE_INSTANCE_NAME}.${CSPACE_PROJECT_NAME}.cspace.local`)"
      - "traefik.http.routers.${CSPACE_CONTAINER_NAME}-preview.entrypoints=web"
      - "traefik.http.routers.${CSPACE_CONTAINER_NAME}-preview.service=${CSPACE_CONTAINER_NAME}-preview"
      - "traefik.http.services.${CSPACE_CONTAINER_NAME}-preview.loadbalancer.server.port=4173"

    volumes:
      - workspace:/workspace
      # .cspace/context/ is the cspace-context MCP server's store —
      # decisions, discoveries, findings, and human-owned direction /
      # principles / roadmap. Bind-mount from the host so every
      # container in the project shares one live view: agent A's
      # log_finding in mercury is visible to agent B in venus without
      # git push/pull. Host pre-creates this dir in provision.Run so
      # it's owned by the invoking user, not Docker's auto-created root.
      - ${PROJECT_ROOT:-.}/.cspace/context:/workspace/.cspace/context
      - claude-home:/home/dev/.claude
      # Project-shared Claude sessions: one host directory holds every
      # session JSONL for this project, so teleport doesn't need to copy
      # transcripts, `cspace resume <instance> <session-id>` works from any
      # instance, and sessions survive volume wipes / container rebuilds.
      # Outside the repo (contains conversation history, potentially large
      # and sensitive — not suitable for git).
      - ${CSPACE_SESSIONS_DIR}:/home/dev/.claude/projects/-workspace
      # Project-shared Claude memory, bind-mounted from the host so it's
      # committed alongside code. Nested under the sessions mount above
      # (docker layers per-path, specific-wins), so memory stays in the
      # repo while sessions live in $HOME. Host pre-creates both before
      # `docker compose up` so they're owned by the invoking user.
      - ${PROJECT_ROOT:-.}/.cspace/memory:/home/dev/.claude/projects/-workspace/memory
      - gh-config:/home/dev/.config/gh
      - cspace-logs:/logs
      - ${CSPACE_TELEPORT_DIR:-/tmp/cspace-teleport}:/teleport
      - /var/run/docker.sock:/var/run/docker.sock

    env_file:
      - path: ${PROJECT_ROOT:-.}/.env
        required: false

    environment:
      - USE_BUILTIN_RIPGREP=0
      - PW_TEST_CONNECT_WS_ENDPOINT=ws://browser:3000/
      # CSPACE_HOME is set to /opt/cspace via ENV in the Dockerfile.
      # Don't pass the host's CSPACE_HOME — that's a host filesystem path
      # that doesn't exist inside the container.
      - CSPACE_CONTAINER_NAME=${CSPACE_CONTAINER_NAME:-}
      - CSPACE_INSTANCE_NAME=${CSPACE_INSTANCE_NAME:-}
      - CSPACE_PROJECT_NAME=${CSPACE_PROJECT_NAME:-}
      # CSPACE_TELEPORT_DIR is deliberately NOT exported into the container.
      # It names a host-side path used only as the /teleport bind-mount
      # source; in-container scripts always use /teleport directly. Exporting
      # it previously leaked macOS paths into Linux containers and broke
      # teleport-prepare.sh (mkdir /Users/... EACCES).
      - CSPACE_FIREWALL_DOMAINS=${CSPACE_FIREWALL_DOMAINS:-}
      # NOTE: Claude Code env vars (ANTHROPIC_MODEL, CLAUDE_CODE_EFFORT_LEVEL)
      # are deliberately NOT set here. Those env vars take precedence over
      # project .claude/settings.json (per Claude Code's precedence rules),
      # so setting them at the container level would stomp whatever the user
      # configured for the project. Interactive `claude` runs inherit from
      # project settings instead. Autonomous supervisor runs get model/effort
      # via explicit --model and --effort CLI args (see internal/supervisor/
      # launch.go), which map to SDK Options and still win for that query.
      - CSPACE_MCP_SERVERS=${CSPACE_MCP_SERVERS:-}
      - TERM_PROGRAM=${TERM_PROGRAM:-}
      - COLORTERM=${COLORTERM:-}

    networks:
      - default   # instance-scoped Compose network (browser sidecar, project services)
      - project   # project-scoped network (shared across all instances of this project)

    depends_on:
      - browser

    ports:
      - "${HOST_PORT_DEV:-0}:3000"
      - "${HOST_PORT_PREVIEW:-0}:4173"

    tty: true
    stdin_open: true

  # llama.cpp embedding server — provides on-device vector embeddings for
  # `cspace search`. Uses jina-embeddings-v5-text-nano (retrieval adapter),
  # 768-dim, 8K context. Accessible at http://llama-server:8080.
  # Model is downloaded from HuggingFace on first start and cached in the
  # llama-models volume. Override with LLAMA_HF_REPO / LLAMA_HF_FILE.
  llama-server:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: ${CSPACE_CONTAINER_NAME}.llama
    command:
      - --hf-repo
      - ${LLAMA_HF_REPO:-jinaai/jina-embeddings-v5-text-nano-retrieval-GGUF}
      - --hf-file
      - ${LLAMA_HF_FILE:-v5-nano-retrieval-Q8_0.gguf}
      - --embedding
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - -c
      - "8192"
      - -b
      - "8192"
      - -ub
      - "8192"
    volumes:
      - llama-models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    networks:
      - default

  # Second llama.cpp server running the Jina clustering adapter for
  # `cspace search clusters`. Retrieval (query→document) and clustering
  # (document↔document) need different adapters, so both run in parallel
  # on separate containers. Accessible at http://llama-clustering:8080.
  llama-clustering:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: ${CSPACE_CONTAINER_NAME}.llama-cluster
    command:
      - --hf-repo
      - ${LLAMA_CLUSTERING_HF_REPO:-jinaai/jina-embeddings-v5-text-nano-clustering-GGUF}
      - --hf-file
      - ${LLAMA_CLUSTERING_HF_FILE:-v5-nano-clustering-Q8_0.gguf}
      - --embedding
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - -c
      - "8192"
      - -b
      - "8192"
      - -ub
      - "8192"
    volumes:
      - llama-models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    networks:
      - default

  # Dimension reduction service for `cspace search clusters`. Uses PaCMAP /
  # LocalMAP to project high-dim embeddings onto 2D. Pre-built image from
  # mindthemath — we only consume its /reduce endpoint.
  reduce-api:
    image: ${REDUCE_API_IMAGE:-mindthemath/reduce-api}
    container_name: ${CSPACE_CONTAINER_NAME}.reduce-api
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - default

  # HDBSCAN clustering service for 2D points. Runs after reduce-api. Minimal
  # image built locally from lib/hdbscan-api/ (just hdbscan + flask).
  hdbscan-api:
    image: ${HDBSCAN_API_IMAGE:-cspace-hdbscan-api}
    container_name: ${CSPACE_CONTAINER_NAME}.hdbscan
    build:
      context: ${CSPACE_HOME}/lib/hdbscan-api
    healthcheck:
      # hdbscan-api image has python but no wget/curl; match reduce-api's probe.
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8090/health\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - default

  # Qdrant vector database — stores commit embeddings for `cspace search`.
  # Accessible inside the container at http://qdrant:6333 (REST) / :6334 (gRPC).
  # Data persists in the qdrant-storage volume across container restarts.
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant}
    container_name: ${CSPACE_CONTAINER_NAME}.qdrant
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      # qdrant/qdrant image ships without curl/wget; probe TCP via bash builtin.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - default

  # Consolidated browser sidecar — headless Chrome (CDP on 9222) + Playwright
  # run-server (3000) in one container. Both MCP servers (chrome-devtools,
  # playwright) run here via docker exec from the agent container.
  # Unrestricted network access — no firewall — so MCP browsers can reach
  # external URLs and container-hosted sites.
  browser:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: ${CSPACE_CONTAINER_NAME}.browser
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Install socat for CDP port forwarding
        apt-get update -qq && apt-get install -y -qq socat >/dev/null 2>&1

        # Start headless Chrome with CDP on port 9223 (internal)
        CHROME=$$(find /ms-playwright -name "chrome" -type f -executable | head -1)
        echo "Launching Chrome: $$CHROME"
        $$CHROME \
          --headless=new \
          --no-sandbox \
          --disable-gpu \
          --disable-dev-shm-usage \
          --remote-debugging-port=9223 \
          --remote-allow-origins=* \
          --user-data-dir=/tmp/chrome-profile &

        # Wait for Chrome CDP to be ready
        until curl -sf http://127.0.0.1:9223/json/version >/dev/null; do sleep 0.5; done
        echo "CDP ready on 9223"

        # Forward 0.0.0.0:9222 -> localhost:9223 (socat rewrites Host header)
        socat TCP-LISTEN:9222,fork,reuseaddr TCP:127.0.0.1:9223 &
        echo "CDP forwarding: 0.0.0.0:9222 -> 127.0.0.1:9223"

        # Start Playwright run-server for E2E tests
        npx -y playwright@1.58.0 run-server --port 3000 --host 0.0.0.0
    networks:
      - default
      - project
    init: true

volumes:
  workspace:
  claude-home:
  gh-config:
  llama-models:
  qdrant-storage:
  # cspace-logs is the only shared/external volume — the supervisor writes
  # NDJSON events under /logs/events/<instance>/ and opens per-instance
  # sockets under /logs/messages/<instance>/, so the host-side `cspace` CLI
  # can reach every running instance through one mount. All other volumes
  # above are per-compose-project (e.g. qdrant-storage MUST be per-instance
  # or concurrent qdrants conflict on a single WAL and crash). Keep this
  # entry LAST so its `name:`/`external:` subkeys don't get silently
  # claimed by a newly-inserted volume above.
  cspace-logs:
    name: ${CSPACE_LOGS_VOLUME:-cspace-logs}
    external: true

networks:
  default: {}
  project:
    external: true
    name: ${CSPACE_PROJECT_NETWORK}
