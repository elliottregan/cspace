# Core devcontainer service — used by all cspace projects.
# Project-specific services are added via compose file layering (-f).
# Browser sidecars (playwright, chromium-cdp) are per-instance for full
# isolation — each instance gets its own browsers with no cross-talk.

services:
  devcontainer:
    image: ${CSPACE_IMAGE:-cspace-dev}
    container_name: ${CSPACE_CONTAINER_NAME}
    hostname: ${CSPACE_INSTANCE_NAME}
    build:
      # Build context is the cspace repo root so the Dockerfile can COPY
      # both bin/cspace and lib/. Override the Dockerfile path via
      # CSPACE_DOCKERFILE for project-specific extensions.
      context: ${CSPACE_HOME}
      dockerfile: ${CSPACE_DOCKERFILE:-${CSPACE_HOME}/lib/templates/Dockerfile}

    # Required for iptables firewall (init-firewall.sh)
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Used by cspace list/down to discover instances
    labels:
      - "cspace.instance=true"
      - "cspace.project=${CSPACE_PROJECT_NAME}"

    volumes:
      - workspace:/workspace
      - claude-home:/home/dev/.claude
      - cspace-memory:/home/dev/.claude/projects/-workspace/memory
      - gh-config:/home/dev/.config/gh
      - cspace-logs:/logs
      - /var/run/docker.sock:/var/run/docker.sock

    env_file:
      - path: ${PROJECT_ROOT:-.}/.env
        required: false

    environment:
      - USE_BUILTIN_RIPGREP=0
      - PW_TEST_CONNECT_WS_ENDPOINT=ws://playwright:3000/
      # CSPACE_HOME is set to /opt/cspace via ENV in the Dockerfile.
      # Don't pass the host's CSPACE_HOME — that's a host filesystem path
      # that doesn't exist inside the container.
      - CSPACE_CONTAINER_NAME=${CSPACE_CONTAINER_NAME:-}
      - CSPACE_FIREWALL_DOMAINS=${CSPACE_FIREWALL_DOMAINS:-}
      - CSPACE_CLAUDE_MODEL=${CSPACE_CLAUDE_MODEL:-claude-opus-4-6[1m]}
      - CSPACE_CLAUDE_EFFORT=${CSPACE_CLAUDE_EFFORT:-max}
      - CSPACE_MCP_SERVERS=${CSPACE_MCP_SERVERS:-}
      - TERM_PROGRAM=${TERM_PROGRAM:-}
      - COLORTERM=${COLORTERM:-}

    networks:
      - default   # instance-scoped Compose network (playwright, chromium-cdp, project services)
      - project   # project-scoped network (shared across all instances of this project)

    depends_on:
      - playwright
      - chromium-cdp

    ports:
      - "${HOST_PORT_DEV:-0}:5173"
      - "${HOST_PORT_PREVIEW:-0}:4173"

    tty: true
    stdin_open: true

  # Playwright run-server for E2E tests.
  # Devcontainers connect via PW_TEST_CONNECT_WS_ENDPOINT=ws://playwright:3000/
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: ${CSPACE_CONTAINER_NAME}.playwright
    command: npx -y playwright@1.58.0 run-server --port 3000 --host 0.0.0.0
    init: true

  # Headless Chromium exposing CDP for the Playwright MCP plugin.
  # Modern Chromium ignores --remote-debugging-address=0.0.0.0,
  # so socat forwards the container-public port to localhost.
  # Devcontainers connect via chromium-cdp:9222 on the instance network.
  chromium-cdp:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: ${CSPACE_CONTAINER_NAME}.chromium-cdp
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq socat >/dev/null 2>&1
        CHROME=$$(find /ms-playwright -name "chrome" -type f -executable | head -1)
        echo "Launching $$CHROME"
        $$CHROME \
          --headless=new \
          --no-sandbox \
          --disable-gpu \
          --disable-dev-shm-usage \
          --remote-debugging-port=9223 \
          --remote-allow-origins=* \
          --user-data-dir=/tmp/chrome-profile &
        until curl -sf http://127.0.0.1:9223/json/version >/dev/null; do sleep 0.5; done
        echo "CDP ready, forwarding 0.0.0.0:9222 -> 127.0.0.1:9223"
        socat TCP-LISTEN:9222,fork,reuseaddr TCP:127.0.0.1:9223
    init: true

volumes:
  workspace:
  claude-home:
  cspace-memory:
    name: ${CSPACE_MEMORY_VOLUME:-cspace-memory}
    external: true
  gh-config:
  cspace-logs:
    name: ${CSPACE_LOGS_VOLUME:-cspace-logs}
    external: true

networks:
  default: {}
  project:
    external: true
    name: ${CSPACE_PROJECT_NETWORK}
