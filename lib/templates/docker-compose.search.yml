# cspace-search-mcp sidecar — exposes the MCP server for semantic search.
# Per-instance: each Claude session gets its own MCP process.
# Reaches the project-scoped search infrastructure (llama-server, qdrant,
# reduce-api, hdbscan-api) via network aliases on the project network.
# No depends_on — the project stack starts before the instance stack,
# so sidecars are typically healthy by the time the first query arrives.
services:
  cspace-search-mcp:
    image: ${CSPACE_IMAGE:-cspace-dev}
    container_name: ${CSPACE_CONTAINER_NAME}.search-mcp
    command: ["cspace", "search", "mcp"]
    working_dir: /workspace
    volumes:
      # workspace is RW (not :ro) because a nested bind mount for
      # .cspace/context can't be layered onto a read-only parent mount;
      # OrbStack/runc rejects the mkdirat on /workspace/.cspace when the
      # parent is :ro. cspace-search-mcp doesn't write to /workspace
      # anyway, so enforcing read-only was only defensive.
      - workspace:/workspace
      # .cspace/context is bind-mounted at runtime via a generated compose
      # override — see writeProjectPathsOverride in internal/compose/compose.go
      # and the matching note in docker-compose.core.yml.
    stdin_open: true
    tty: false
    restart: unless-stopped
    networks:
      - default
      - project
