# cspace-search per-project configuration override.
#
# Defaults ship embedded in the binary — only keys set here override them.
# Uncomment and edit what you need. See the embedded default.yaml in the
# cspace-search binary for the full schema.
#
# -----------------------------------------------------------------------
# Master switch. Search is OFF by default so a fresh cspace project
# doesn't incidentally start indexing (e.g. pulling in node_modules).
# Flip this to `true` when you want agents and CLIs in this project to
# actually build indexes and run queries.
enabled: false
# -----------------------------------------------------------------------
#
# Corpus defaults (only relevant once `enabled: true` above):
#   code     — enabled  (source of truth for "where does X happen?")
#   commits  — enabled  (git history; "how did it get here?")
#   context  — DISABLED (.cspace/context/ files are usually small enough
#                       to read directly; indexing them pays embed/qdrant
#                       cost for negligible retrieval benefit)
#   issues   — DISABLED (requires GH_TOKEN; hits the GitHub API on every
#                       bootstrap/hook; opt-in per project)
#
# Opt a disabled corpus in by setting enabled: true under its key below.
#
# Common overrides:
#
# sidecars:
#   # Point at non-default sidecar hostnames (e.g. when running from a host
#   # shell that can't resolve the in-compose service names).
#   qdrant_url: "http://qdrant:6333"
#   llama_retrieval_url: "http://llama-server:8080"
#
# corpora:
#   code:
#     # Add project-specific exclude globs on top of the defaults
#     # (vendor/**, internal/assets/embedded/**, *.lock, etc).
#     excludes:
#       - "generated/**"
#       - "*.pb.go"
#     # Lower for repos with very large source files.
#     # max_bytes: 204800
#   commits:
#     # Upper bound on commits to embed on each re-index.
#     limit: 500
#   context:
#     # Opt in — re-enables indexing of .cspace/context/ artifacts.
#     enabled: true
#   issues:
#     # Opt in — re-enables indexing of GitHub issues + PRs. Requires
#     # GH_TOKEN to be set in the container environment.
#     enabled: true
#     limit: 500
